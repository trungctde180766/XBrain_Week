apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/trungctde180766/XBrain_Week.git'
    targetRevision: HEAD
    path: cloud/w9/todo-app/frontend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
