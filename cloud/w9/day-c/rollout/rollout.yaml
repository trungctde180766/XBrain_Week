apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: sample-rollout
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 5
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-app
        image: nginx:1.15.4
        ports:
        - containerPort: 80
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 1m}
      - analysis:
          templates:
          - templateName: success-rate
          args:
          - name: service-name
            value: sample-app
      - setWeight: 50
      - pause: {duration: 1m}
      - setWeight: 100
