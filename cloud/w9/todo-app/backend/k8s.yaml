apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
      - name: todo-backend
        image: todo-backend:1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: VERSION
          value: "v1"
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend-svc
  namespace: demo
spec:
  selector:
    app: todo-backend
  ports:
  - port: 5000
    targetPort: 5000
