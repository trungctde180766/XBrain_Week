<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App – W9 GitOps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: #1e293b; border-radius: 16px; padding: 32px; width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    h1 { font-size: 1.6rem; font-weight: 700; color: #38bdf8; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #38bdf8; }
    button.add { background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
    button.add:hover { background: #0ea5e9; }
    .todo-item { display: flex; align-items: center; gap: 12px; background: #0f172a; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; transition: opacity .2s; }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done span { text-decoration: line-through; }
    .todo-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #38bdf8; cursor: pointer; }
    .todo-item span { flex: 1; font-size: 0.95rem; }
    .del { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; }
    .del:hover { color: #f87171; }
    #status { margin-top: 16px; font-size: 0.8rem; color: #64748b; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 Todo App</h1>
  <p class="subtitle">W9 GitOps Demo – Backend: Flask API | Orchestration: ArgoCD</p>
  <div class="input-row">
    <input id="newTodo" type="text" placeholder="Thêm công việc mới..." />
    <button class="add" onclick="addTodo()">Thêm</button>
  </div>
  <div id="todoList"></div>
  <p id="status">Đang kết nối Backend...</p>
</div>

<script>
  const API = 'http://192.168.49.2:30500';

  async function loadTodos() {
    try {
      const res = await fetch(`${API}/todos`);
      const todos = await res.json();
      document.getElementById('status').textContent = `✅ Đã kết nối – ${todos.length} công việc`;
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}" id="item-${t.id}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})"/>
          <span>${t.title}</span>
          <button class="del" onclick="deleteTodo(${t.id})">✕</button>
        </div>`).join('');
    } catch(e) {
      document.getElementById('status').textContent = '❌ Không thể kết nối Backend';
    }
  }

  async function addTodo() {
    const input = document.getElementById('newTodo');
    if (!input.value.trim()) return;
    await fetch(`${API}/todos`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title: input.value}) });
    input.value = '';
    loadTodos();
  }

  async function toggle(id) {
    await fetch(`${API}/todos/${id}`, { method:'PUT' });
    loadTodos();
  }

  async function deleteTodo(id) {
    await fetch(`${API}/todos/${id}`, { method:'DELETE' });
    loadTodos();
  }

  document.getElementById('newTodo').addEventListener('keydown', e => { if(e.key==='Enter') addTodo(); });
  loadTodos();
</script>
</body>
</html>
