name: Validate YAML (Plan on PR)

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubeconform
        run: |
          curl -LO https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar -xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          
      - name: Check YAML syntax
        # We validate the rollout folder. We ignore CustomResourceDefinitions if we don't pass the schema, 
        # but kubeconform will check standard k8s syntax.
        run: kubeconform -strict -summary -ignore-missing-schemas cloud/w9/day-c/rollout/
